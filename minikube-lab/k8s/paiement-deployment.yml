apiVersion: apps/v1
kind: Deployment
metadata:
  name: paiement-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paiement-service
  template:
    metadata:
      labels:
        app: paiement-service
    spec:
      containers:
        - name: paiement-service
          image: paiement-service:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-paiement-service:5432/service2db
            - name: SPRING_DATASOURCE_USERNAME
              value: service2user
            - name: SPRING_DATASOURCE_PASSWORD
              value: service2pass
name: Microservices CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build discovery-service
        run: |
          cd discovery-service
          mvn clean install -DskipTests

      - name: Build and push Docker image discovery-service
        run: |
          cd discovery-service
          docker build -t woulfric/discovery-service:latest .
          docker push woulfric/discovery-service:latest

      - name: Build config-service
        run: |
          cd config-service
          mvn clean install -DskipTests

      - name: Build and push Docker image config-service
        run: |
          cd config-service
          docker build -t woulfric/config-service:latest .
          docker push woulfric/config-service:latest

      - name: Build catalogue-service
        run: |
          cd catalogue-service
          mvn clean install -DskipTests

      - name: Build and push Docker image catalogue-service
        run: |
          cd catalogue-service
          docker build -t woulfric/catalogue-service:latest .
          docker push woulfric/catalogue-service:latest

      - name: Build commande-service
        run: |
          cd commande-service
          mvn clean install -DskipTests

      - name: Build and push Docker image commande-service
        run: |
          cd commande-service
          docker build -t woulfric/commande-service:latest .
          docker push woulfric/commande-service:latest

      - name: Build paiement-service
        run: |
          cd paiement-service
          mvn clean install -DskipTests

      - name: Build and push Docker image paiement-service
        run: |
          cd paiement-service
          docker build -t woulfric/paiement-service:latest .
          docker push woulfric/paiement-service:latest

      - name: Build gateway-service
        run: |
          cd gateway-service
          mvn clean install -DskipTests

      - name: Build and push Docker image gateway-service
        run: |
          cd gateway-service
          docker build -t woulfric/gateway-service:latest .
          docker push woulfric/gateway-service:latest
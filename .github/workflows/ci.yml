name: Microservices CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build discovery-service
        run: |
          cd discovery-service
          mvn clean install -DskipTests

      - name: Build Docker image discovery-service
        run: |
          cd discovery-service
          docker build -t discovery-service .

      - name: Build config-service
        run: |
          cd config-service
          mvn clean install -DskipTests

      - name: Build Docker image config-service
        run: |
          cd config-service
          docker build -t config-service .

      - name: Build catalogue-service
        run: |
          cd catalogue-service
          mvn clean install -DskipTests

      - name: Build Docker image catalogue-service
        run: |
          cd catalogue-service
          docker build -t catalogue-service .

      - name: Build commande-service
        run: |
          cd commande-service
          mvn clean install -DskipTests

      - name: Build Docker image commande-service
        run: |
          cd commande-service
          docker build -t commande-service .

      - name: Build paiement-service
        run: |
          cd paiement-service
          mvn clean install -DskipTests

      - name: Build Docker image paiement-service
        run: |
          cd paiement-service
          docker build -t paiement-service .

      - name: Build gateway-service
        run: |
          cd gateway-service
          mvn clean install -DskipTests

      - name: Build Docker image gateway-service
        run: |
          cd gateway-service
          docker build -t gateway-service .

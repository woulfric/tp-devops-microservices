name: Catalogue Service CI

on:
  push:
    branches: [ main ]
    paths:
      - 'catalogue-service/**'
      - '.github/workflows/catalogue-service.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'catalogue-service/**'
      - '.github/workflows/catalogue-service.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build catalogue-service
        run: |
          cd catalogue-service
          mvn clean install -DskipTests
